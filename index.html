<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="yellow-area"></div>
            <div class="head-text">
                Task Tracker
            </div>
            <button class="btn sort-btn">
                <img src="./images/Group-74.svg" class="sort-img default-icon" alt="Sort">
                <img src="./images/Group-73.svg" class="sort-img hover-icon" alt="Sort">
            </button>
            <div class="input-area">
                <div class="input-container">
                    <input type="text" name="task" id="input-task">
                    <button class="btn clear-btn">
                        <img src="./images/Group-56.svg" class="default-icon" alt="Clear">
                        <img src="./images/Group-70.svg" class="hover-icon" alt="Clear">
                    </button>
                </div>
            </div>
            <div class="task-list"></div>            
            <div class="add-buttons">
                <button class="plus-btn">+</button>
                <button class="add-btn">Add</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
